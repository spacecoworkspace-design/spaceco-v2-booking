<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://mhoustvvwmwfovocwwna.supabase.co;"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>SPACECO | Confirm Booking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<script src="js/vendor/supabase-js.umd.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "#fbf9f8", "on-background": "#1b1c1c", surface: "#fbf9f8",
          "surface-container": "#efeded", "on-surface-variant": "#444748", primary: "#000000",
          secondary: "#775a19", "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "outline-variant": "#c4c7c7", error: "#ba1a1a",
        },
        fontFamily: {
          "label-mono": ["JetBrains Mono"], "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"],
          "headline-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"], "display-lg": ["Hanken Grotesk"],
        },
        fontSize: {
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.01em", fontWeight: "600" }],
          "headline-md": ["22px", { lineHeight: "30px", fontWeight: "600" }],
          "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
        spacing: { "margin-mobile": "24px", "stack-md": "24px", "stack-lg": "48px" },
        borderRadius: { DEFAULT: "0px" },
      },
    },
  };
</script>
<style>
  body { font-family: 'Hanken Grotesk', sans-serif; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen">

<header class="w-full sticky top-0 bg-background border-b border-outline-variant flex justify-between items-center px-margin-mobile py-4 z-40">
  <h1 class="font-display-lg tracking-tighter text-primary" style="font-size:28px;">SPACECO</h1>
  <a href="select-time.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Change Time</a>
</header>

<main class="max-w-xl mx-auto px-margin-mobile pt-stack-lg pb-32">
  <span class="font-label-mono text-label-mono uppercase text-secondary mb-2 block">Reservation Process</span>
  <h1 class="font-display-lg text-primary mb-stack-md">Confirm Booking</h1>

  <div class="relative bg-surface border border-outline-variant p-6 mb-stack-lg">
    <p class="font-label-mono text-label-mono uppercase text-on-surface-variant mb-1">Your Selection</p>
    <p id="booking-summary" class="font-headline-md text-primary"></p>
  </div>

  <div id="member-view" class="hidden mb-stack-lg">
    <div class="bg-surface-container p-6">
      <p class="font-label-mono text-label-mono uppercase text-on-surface-variant mb-1">Booking as</p>
      <p id="member-name" class="font-headline-md text-primary"></p>
    </div>
    <button id="book-as-guest-btn" class="font-label-mono text-label-mono text-on-surface-variant uppercase underline mt-3">Book as guest instead</button>
  </div>

  <div id="guest-view" class="hidden space-y-stack-md mb-stack-lg">
    <div>
      <label class="font-label-mono text-label-mono uppercase block mb-2" for="guest-name">Full Name</label>
      <input class="w-full border-b border-outline-variant focus:border-primary bg-transparent py-3 focus:ring-0 focus:outline-none font-body-lg" id="guest-name" type="text"/>
    </div>
    <div>
      <label class="font-label-mono text-label-mono uppercase block mb-2" for="guest-phone">Phone Number</label>
      <input class="w-full border-b border-outline-variant focus:border-primary bg-transparent py-3 focus:ring-0 focus:outline-none font-body-lg" id="guest-phone" type="tel"/>
    </div>
    <div>
      <label class="font-label-mono text-label-mono uppercase block mb-2" for="guest-email">Email (optional)</label>
      <input class="w-full border-b border-outline-variant focus:border-primary bg-transparent py-3 focus:ring-0 focus:outline-none font-body-lg" id="guest-email" type="email"/>
    </div>
  </div>

  <p id="form-error" class="text-error mb-4 hidden"></p>
  <button id="confirm-btn" class="w-full bg-primary text-white py-4 font-headline-md font-bold uppercase tracking-widest hover:opacity-90">Confirm Reservation</button>
</main>

<script src="js/supabase-client.js"></script>
<script src="js/booking.js"></script>
<script>
  const supabaseClient = window.getSpacecoClient();
  const draft = loadBookingDraft();
  if (!draft || !draft.timeIn) {
    window.location.href = "select-room.html";
  }

  function formatHour(t) {
    const [h] = t.split(":").map(Number);
    const period = h >= 12 ? "PM" : "AM";
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    return `${hour12}:00 ${period}`;
  }

  document.getElementById("booking-summary").textContent =
    `${draft.roomLabel} — ${draft.date}, ${formatHour(draft.timeIn)} to ${formatHour(draft.timeOut)}`;

  let signedInClient = null;
  let bookAsGuest = false;

  async function init() {
    signedInClient = await getSignedInClient(supabaseClient);
    if (signedInClient) {
      document.getElementById("member-name").textContent = `${signedInClient.name} (#${signedInClient.id})`;
      document.getElementById("member-view").classList.remove("hidden");
    } else {
      document.getElementById("guest-view").classList.remove("hidden");
    }
  }

  document.getElementById("book-as-guest-btn").addEventListener("click", () => {
    bookAsGuest = true;
    document.getElementById("member-view").classList.add("hidden");
    document.getElementById("guest-view").classList.remove("hidden");
  });

  document.getElementById("confirm-btn").addEventListener("click", async () => {
    const errEl = document.getElementById("form-error");
    errEl.classList.add("hidden");
    const btn = document.getElementById("confirm-btn");
    btn.disabled = true;
    btn.textContent = "Booking...";

    const useClient = signedInClient && !bookAsGuest;
    let payload = {
      roomLabel: draft.roomLabel,
      roomKey: draft.roomKey,
      date: draft.date,
      timeIn: draft.timeIn,
      timeOut: draft.timeOut,
    };

    if (useClient) {
      payload.client = signedInClient;
    } else {
      const name = document.getElementById("guest-name").value.trim();
      const phone = document.getElementById("guest-phone").value.trim();
      if (!name || !phone) {
        errEl.textContent = "Name and phone are required.";
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Confirm Reservation";
        return;
      }
      payload.guestName = name;
      payload.guestPhone = phone;
      payload.guestEmail = document.getElementById("guest-email").value.trim();
    }

    const result = await submitBooking(supabaseClient, payload);
    if (result.error) {
      errEl.textContent = result.error;
      errEl.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Confirm Reservation";
      return;
    }

    saveBookingDraft({ ...draft, reservationId: result.reservationId, booked: true });
    window.location.href = "booking-confirmed.html";
  });

  init();
</script>
</body>
</html>
