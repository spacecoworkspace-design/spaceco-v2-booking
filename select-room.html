<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://mhoustvvwmwfovocwwna.supabase.co;"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>SPACECO | Book a Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<script src="js/vendor/supabase-js.umd.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "#fbf9f8", "on-background": "#1b1c1c", surface: "#fbf9f8",
          "surface-container": "#efeded", "on-surface-variant": "#444748", primary: "#000000",
          secondary: "#775a19", "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "outline-variant": "#c4c7c7", error: "#ba1a1a",
        },
        fontFamily: {
          "label-mono": ["JetBrains Mono"], "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"],
          "headline-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"], "display-lg": ["Hanken Grotesk"],
        },
        fontSize: {
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.01em", fontWeight: "600" }],
          "headline-md": ["22px", { lineHeight: "30px", fontWeight: "600" }],
          "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
        spacing: { "margin-mobile": "24px", "stack-md": "24px", "stack-lg": "48px" },
        borderRadius: { DEFAULT: "0px" },
      },
    },
  };
</script>
<style>
  body { font-family: 'Hanken Grotesk', sans-serif; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen">

<header class="w-full sticky top-0 bg-background border-b border-outline-variant flex justify-between items-center px-margin-mobile py-4 z-40">
  <h1 class="font-display-lg tracking-tighter text-primary" style="font-size:28px;">SPACECO</h1>
  <a href="my-bookings.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">My Bookings</a>
</header>

<main class="max-w-3xl mx-auto px-margin-mobile pt-stack-lg pb-32">
  <span class="font-label-mono text-label-mono uppercase text-secondary mb-2 block">Reserve Your Space</span>
  <h1 class="font-display-lg text-primary mb-stack-md">Book a Room</h1>
  <p class="mb-stack-lg">Choose a room to see availability and pick a time.</p>

  <div id="room-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
</main>

<script src="js/supabase-client.js"></script>
<script src="js/booking.js"></script>
<script>
  clearBookingDraft();

  const grid = document.getElementById("room-grid");
  ROOMS.forEach(r => {
    const card = document.createElement("button");
    card.className = "text-left border border-outline-variant bg-surface p-6 hover:border-primary transition-all";
    card.innerHTML = `<h3 class="font-headline-md text-primary mb-1">${r.label}</h3><span class="font-label-mono text-label-mono uppercase text-on-surface-variant">Select</span>`;
    card.addEventListener("click", () => {
      saveBookingDraft({ roomLabel: r.label, roomKey: r.key });
      window.location.href = "select-time.html";
    });
    grid.appendChild(card);
  });
</script>
</body>
</html>
