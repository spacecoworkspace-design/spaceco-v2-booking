<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://mhoustvvwmwfovocwwna.supabase.co;"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>SPACECO | My Bookings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<script src="js/vendor/supabase-js.umd.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "#fbf9f8", "on-background": "#1b1c1c", surface: "#fbf9f8",
          "surface-container": "#efeded", "on-surface-variant": "#444748", primary: "#000000",
          secondary: "#775a19", "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "outline-variant": "#c4c7c7", error: "#ba1a1a",
        },
        fontFamily: {
          "label-mono": ["JetBrains Mono"], "body-lg": ["Hanken Grotesk"],
          "headline-md": ["Hanken Grotesk"], "display-lg": ["Hanken Grotesk"],
        },
        fontSize: {
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "headline-md": ["22px", { lineHeight: "30px", fontWeight: "600" }],
          "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
        spacing: { "margin-mobile": "24px", "stack-md": "24px", "stack-lg": "48px" },
        borderRadius: { DEFAULT: "0px" },
      },
    },
  };
</script>
<style>
  body { font-family: 'Hanken Grotesk', sans-serif; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen">

<header class="w-full sticky top-0 bg-background border-b border-outline-variant flex justify-between items-center px-margin-mobile py-4 z-40">
  <h1 class="font-display-lg tracking-tighter text-primary" style="font-size:28px;">SPACECO</h1>
  <a href="select-room.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Book a Room</a>
</header>

<main class="max-w-3xl mx-auto px-margin-mobile pt-stack-lg pb-32">
  <span class="font-label-mono text-label-mono uppercase text-secondary mb-2 block">Reservations</span>
  <h1 class="font-display-lg text-primary mb-stack-lg">My Bookings</h1>

  <div id="loading-state" class="font-label-mono text-label-mono uppercase text-on-surface-variant">Loading...</div>

  <div id="signed-out-state" class="hidden">
    <p class="mb-4">Sign in to see your bookings.</p>
    <a href="../spaceco-v2-website/sign-in.html" class="inline-block bg-primary text-white py-3 px-6 font-label-mono text-label-mono uppercase hover:opacity-90">Sign In</a>
  </div>

  <div id="bookings-list" class="hidden space-y-4"></div>
  <p id="empty-state" class="hidden font-label-mono text-label-mono uppercase text-on-surface-variant py-12">No bookings yet.</p>
</main>

<script src="js/supabase-client.js"></script>
<script src="js/booking.js"></script>
<script>
  const supabaseClient = window.getSpacecoClient();

  function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function formatHour(t) {
    const [h] = t.split(":").map(Number);
    const period = h >= 12 ? "PM" : "AM";
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    return `${hour12}:00 ${period}`;
  }

  const STATUS_LABEL = {
    pending: "Pending", upcoming: "Upcoming", confirmed: "Confirmed",
    cancelled: "Cancelled", completed: "Completed",
  };

  function renderBooking(b) {
    const card = el("div", "bg-surface border border-outline-variant p-6 flex items-center justify-between gap-4");
    const left = el("div");
    left.appendChild(el("span", "font-label-mono text-[11px] uppercase px-2 py-1 bg-surface-container inline-block mb-2", STATUS_LABEL[b.status] || b.status));
    left.appendChild(el("h3", "font-headline-md text-primary", b.room || "Room"));
    left.appendChild(el("p", "font-label-mono text-label-mono text-on-surface-variant mt-1",
      `${b.reservation_date}${b.time_in ? ", " + formatHour(b.time_in.slice(0, 5)) + " to " + formatHour(b.time_out.slice(0, 5)) : ""}`));
    card.appendChild(left);

    if (b.status === "pending" || b.status === "upcoming" || b.status === "confirmed") {
      const cancelBtn = el("button", "border border-outline-variant text-on-surface-variant py-2 px-4 font-label-mono text-[11px] uppercase hover:border-error hover:text-error", "Cancel");
      cancelBtn.addEventListener("click", async () => {
        if (!confirm("Cancel this booking?")) return;
        cancelBtn.disabled = true;
        const result = await cancelBooking(supabaseClient, b.id);
        if (result.error) {
          alert(result.error);
          cancelBtn.disabled = false;
          return;
        }
        loadBookings();
      });
      card.appendChild(cancelBtn);
    }

    return card;
  }

  async function loadBookings() {
    const result = await fetchMyBookings(supabaseClient);
    document.getElementById("loading-state").classList.add("hidden");

    if (result.error === "not signed in") {
      document.getElementById("signed-out-state").classList.remove("hidden");
      return;
    }
    if (result.error) {
      document.getElementById("empty-state").textContent = "Failed to load: " + result.error;
      document.getElementById("empty-state").classList.remove("hidden");
      return;
    }

    const list = document.getElementById("bookings-list");
    list.innerHTML = "";
    if (!result.bookings.length) {
      document.getElementById("empty-state").classList.remove("hidden");
      return;
    }
    result.bookings.forEach(b => list.appendChild(renderBooking(b)));
    list.classList.remove("hidden");
  }

  loadBookings();
</script>
</body>
</html>
